---
name: SwiftLint
on:
  pull_request:
    paths:
      - '.github/workflows/swiftlint.yml'
      - '.swiftlint.yml'
      - '.swiftlint-version'
      - '**/*.swift'
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    # Pin SwiftLint to the version in .swiftlint-version — the same file the
    # local pre-commit hook (Scripts/hooks/pre-commit) reads — so the lint
    # gate is reproducible: a new Homebrew release can't silently change a
    # rule and fail a PR that passed locally. The release ships a universal
    # (x86_64 + arm64) binary, so it runs natively on the arm64 macOS runner.
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      # No submodules — vendor/libgit2 is excluded from linting and
      # the lint job never builds.
      - uses: actions/checkout@v6
      - name: Install SwiftLint
        run: |
          version="$(cat .swiftlint-version)"
          curl -fsSL -o swiftlint.zip \
            "https://github.com/realm/SwiftLint/releases/download/${version}/portable_swiftlint.zip"
          mkdir -p "$RUNNER_TEMP/swiftlint"
          unzip -oq swiftlint.zip -d "$RUNNER_TEMP/swiftlint"
          echo "$RUNNER_TEMP/swiftlint" >> "$GITHUB_PATH"
      - name: SwiftLint version
        run: swiftlint --version
      - name: Lint
        run: swiftlint lint --strict --quiet
