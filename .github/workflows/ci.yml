name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  macos:
    name: macOS
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test

  linux:
    name: Linux
    runs-on: ubuntu-latest
    container:
      image: swift:6.2-jammy
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Install C dependencies
        # libgit2 links -lz (zlib); HTTPS uses OpenSSL via dlopen at runtime.
        run: |
          apt-get update
          apt-get install -y zlib1g-dev libssl-dev pkg-config ca-certificates
      - run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test

  windows:
    name: Windows
    runs-on: windows-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Setup Swift
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: "6.3.1"
      - run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test

  android:
    name: Android
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Build & test (Android emulator)
        uses: skiptools/swift-android-action@v2
        with:
          # Latest full-patch version published in the swift-android-toolchain
          # release feed (no 6.3.x exists there yet); a bare "6.2" would drift
          # host vs SDK.
          swift-version: "6.2.3"
          free-disk-space: true
