name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Cancel earlier runs of this workflow on the same branch as soon as a new
# commit comes in — the Android lane in particular is expensive, and stacking
# runs wastes capacity.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    name: macOS
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test
      - name: Test (Archive trait)
        run: swift test --traits Archive

  ios:
    name: iOS
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      # Cross-compile only — iOS runs on devices/simulators; the API is identical
      # to macOS, which runs the test suite above.
      - name: Build (iOS)
        run: xcodebuild build -scheme GitKit -destination 'generic/platform=iOS' -skipMacroValidation

  linux:
    name: Linux
    runs-on: ubuntu-latest
    container:
      image: swift:6.2-jammy
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Install C dependencies
        # libgit2 links -lz (zlib); HTTPS uses OpenSSL via dlopen at runtime.
        # bz2/lzma/zstd back swift-archive's filters for the Archive-trait run.
        run: |
          apt-get update
          apt-get install -y zlib1g-dev libssl-dev pkg-config ca-certificates \
            libbz2-dev liblzma-dev libzstd-dev
      - run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test
      - name: Test (Archive trait)
        run: swift test --traits Archive

  windows:
    name: Windows
    runs-on: windows-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Setup Swift
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: "6.3.1"
      - run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test

  android:
    name: Android
    runs-on: ubuntu-latest
    # A healthy run takes ~3 minutes; a wedged emulator should fail fast
    # instead of burning the previous 60-minute allowance.
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      # The 16 GB standard runner OOM-kills the job (exit 137) when the
      # parallel libgit2/Swift compile overlaps with the emulator; swap
      # absorbs the peak instead of letting the kernel SIGKILL a process.
      - name: Add swap for build+emulator memory peaks
        run: |
          sudo fallocate -l 8G /mnt/swapfile2
          sudo chmod 600 /mnt/swapfile2
          sudo mkswap /mnt/swapfile2
          sudo swapon /mnt/swapfile2
          free -h
      - name: Build & test (Android emulator)
        uses: skiptools/swift-android-action@v2
        with:
          # Must exist in BOTH the swift.org host-toolchain feed and the
          # swift-android-toolchain SDK feed; 6.3.1 is in both now (SwiftText's
          # Android lane runs it with this same action).
          swift-version: "6.3.1"
          free-disk-space: true
          # Halve compiler parallelism and cap the emulator's RAM so their
          # combined peak stays under 16 GB. The emulator options replace the
          # action's defaults, so keep its stock flags alongside -memory.
          swift-build-flags: "-j 2"
          android-emulator-options: "-no-window -noaudio -no-boot-anim -memory 2048"
